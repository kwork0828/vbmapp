<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VB-MAPP 레벨2 체크리스트</title>
<style>
  :root {
    --primary: #6C63FF;
    --primary-light: #EEF0FF;
    --success: #22C55E;
    --success-light: #DCFCE7;
    --danger: #EF4444;
    --warning: #F59E0B;
    --bg: #F8F9FF;
    --card: #FFFFFF;
    --text: #1E1E2E;
    --muted: #6B7280;
    --border: #E5E7EB;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(108,99,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 24px;
  }
  .login-card {
    background: white; border-radius: 24px; padding: 36px 28px;
    width: 100%; max-width: 380px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-logo { font-size: 48px; margin-bottom: 12px; }
  .login-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .tab-row { display: flex; background: #F3F4F6; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
  .tab-btn {
    flex: 1; padding: 9px; border: none; background: transparent; border-radius: 9px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--muted);
  }
  .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .form-group { margin-bottom: 16px; text-align: left; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px;
    font-size: 16px; outline: none; transition: border-color 0.2s; background: #FAFAFA;
  }
  .form-input:focus { border-color: var(--primary); background: white; }
  .btn-primary {
    width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
    border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
    transition: all 0.2s; margin-top: 4px;
  }
  .btn-primary:active { transform: scale(0.97); }
  .profile-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .profile-item {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
    border: 2px solid var(--border); border-radius: 14px; cursor: pointer;
    transition: all 0.2s; background: #FAFAFA; text-align: left;
  }
  .profile-item:hover, .profile-item.selected { border-color: var(--primary); background: var(--primary-light); }
  .profile-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: var(--primary);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; flex-shrink: 0;
  }
  .profile-name { font-size: 15px; font-weight: 600; }
  .profile-progress { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .pin-inputs { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
  .pin-input {
    width: 52px; height: 60px; text-align: center; font-size: 24px; font-weight: 700;
    border: 2px solid var(--border); border-radius: 12px; outline: none;
    transition: border-color 0.2s; background: #FAFAFA;
  }
  .pin-input:focus { border-color: var(--primary); background: white; }
  .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; display: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── APP ── */
  #app-screen { display: none; }
  .app-header {
    background: white; border-bottom: 1px solid var(--border); padding: 14px 20px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-avatar {
    width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
    color: white; display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .header-name { font-size: 16px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); }
  .btn-logout {
    padding: 8px 14px; border: 1px solid var(--border); background: white;
    border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
  }

  .overall-card {
    margin: 16px 16px 0; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: var(--radius); color: white;
  }
  .overall-label { font-size: 13px; opacity: 0.85; margin-bottom: 6px; }
  .overall-score { font-size: 36px; font-weight: 800; }
  .overall-score span { font-size: 18px; font-weight: 400; opacity: 0.75; }
  .overall-bar-bg { height: 8px; background: rgba(255,255,255,0.3); border-radius: 4px; margin-top: 12px; }
  .overall-bar { height: 8px; background: white; border-radius: 4px; transition: width 0.4s; }
  .overall-pct { font-size: 12px; opacity: 0.85; margin-top: 6px; text-align: right; }

  .section-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 40px; }

  .section-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .section-header {
    padding: 18px 20px; cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 12px;
    border-left: 4px solid var(--primary);
  }
  .section-icon { font-size: 22px; flex-shrink: 0; }
  .section-info { flex: 1; }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .section-badge {
    background: var(--primary-light); color: var(--primary);
    font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
  }
  .section-badge.done { background: var(--success-light); color: var(--success); }
  .chevron { font-size: 18px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .section-card.open .chevron { transform: rotate(180deg); }

  .section-progress-bar { height: 4px; background: #F3F4F6; }
  .section-progress-fill { height: 4px; background: var(--primary); transition: width 0.3s; }
  .section-progress-fill.done { background: var(--success); }

  .items-container { display: none; padding: 4px 0 12px; }
  .section-card.open .items-container { display: block; }

  .item-row {
    display: flex; align-items: flex-start; gap: 14px; padding: 14px 20px;
    border-top: 1px solid #F9FAFB; cursor: pointer; transition: background 0.15s;
  }
  .item-row:active { background: #F9FAFB; }
  .item-num {
    width: 28px; height: 28px; border-radius: 8px; background: #F3F4F6;
    font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted); margin-top: 1px;
  }
  .item-num.checked { background: var(--primary); color: white; }
  .item-content { flex: 1; }
  .item-text { font-size: 14px; line-height: 1.6; color: var(--text); }
  .item-example { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.5; }
  .custom-check {
    width: 26px; height: 26px; border: 2.5px solid var(--border); border-radius: 8px;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-top: 1px;
  }
  .custom-check.checked { background: var(--primary); border-color: var(--primary); }
  .custom-check.checked::after { content: '✓'; color: white; font-size: 15px; font-weight: 700; }

  .save-toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #1E1E2E; color: white; padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 600; transition: transform 0.3s; z-index: 999;
    white-space: nowrap;
  }
  .save-toast.show { transform: translateX(-50%) translateY(0); }

  /* ── MANAGE PROFILES ── */
  .manage-link { text-align: center; margin-top: 16px; }
  .manage-link button { background: none; border: none; color: var(--primary); font-size: 13px; cursor: pointer; text-decoration: underline; }

  #manage-screen { display: none; min-height: 100vh; background: var(--bg); padding: 24px 20px; }
  .manage-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .back-btn { background: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .manage-title { font-size: 20px; font-weight: 800; }
  .profile-manage-item {
    display: flex; align-items: center; gap: 12px; padding: 16px;
    background: white; border-radius: 14px; margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .delete-btn { background: #FEE2E2; border: none; color: var(--danger); padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: auto; }
</style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🧩</div>
    <div class="login-title">VB-MAPP 레벨 2</div>
    <div class="login-sub">마일스톤 평가 (18-30개월)</div>

    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('select')">프로필 선택</button>
      <button class="tab-btn" onclick="switchTab('new')">새 프로필</button>
    </div>

    <!-- SELECT PROFILE TAB -->
    <div id="tab-select">
      <div id="profile-list-empty" style="text-align:center; color:var(--muted); padding:20px 0; font-size:14px;">
        아직 등록된 프로필이 없어요.<br>새 프로필을 만들어주세요!
      </div>
      <div class="profile-list" id="profile-list"></div>

      <div id="pin-enter-section" style="display:none;">
        <div style="font-size:14px; color:var(--muted); margin-bottom:4px;">PIN 번호 4자리를 입력해주세요</div>
        <div class="pin-inputs">
          <input class="pin-input" type="number" maxlength="1" id="p0" oninput="pinMove(0)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="p1" oninput="pinMove(1)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="p2" oninput="pinMove(2)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="p3" oninput="pinMove(3)" inputmode="numeric" pattern="[0-9]*">
        </div>
        <div class="error-msg" id="pin-error">❌ PIN이 맞지 않아요. 다시 시도해주세요.</div>
        <button class="btn-primary" onclick="loginWithPin()">로그인</button>
      </div>

      <div class="manage-link">
        <button onclick="showManage()">프로필 관리</button>
      </div>
    </div>

    <!-- NEW PROFILE TAB -->
    <div id="tab-new" style="display:none;">
      <div class="form-group">
        <label class="form-label">아이 이름</label>
        <input class="form-input" type="text" id="new-name" placeholder="예: 김민준" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">PIN 번호 4자리</label>
        <div class="pin-inputs">
          <input class="pin-input" type="number" maxlength="1" id="n0" oninput="newPinMove(0)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="n1" oninput="newPinMove(1)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="n2" oninput="newPinMove(2)" inputmode="numeric" pattern="[0-9]*">
          <input class="pin-input" type="number" maxlength="1" id="n3" oninput="newPinMove(3)" inputmode="numeric" pattern="[0-9]*">
        </div>
      </div>
      <div class="error-msg" id="new-error">이름을 입력하고 PIN 4자리를 모두 입력해주세요.</div>
      <button class="btn-primary" onclick="createProfile()">프로필 만들기</button>
    </div>
  </div>
</div>

<!-- ═══ MANAGE SCREEN ═══ -->
<div id="manage-screen">
  <div class="manage-header">
    <button class="back-btn" onclick="showLogin()">← 뒤로</button>
    <div class="manage-title">프로필 관리</div>
  </div>
  <div id="manage-list"></div>
</div>

<!-- ═══ APP SCREEN ═══ -->
<div id="app-screen">
  <div class="app-header">
    <div class="header-left">
      <div class="header-avatar" id="hdr-avatar"></div>
      <div>
        <div class="header-name" id="hdr-name"></div>
        <div class="header-sub">VB-MAPP 레벨 2</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>

  <div class="overall-card">
    <div class="overall-label">전체 진행률</div>
    <div class="overall-score"><span id="overall-done">0</span> <span>/ 60 완료</span></div>
    <div class="overall-bar-bg"><div class="overall-bar" id="overall-bar" style="width:0%"></div></div>
    <div class="overall-pct" id="overall-pct">0%</div>
  </div>

  <div class="section-list" id="section-list"></div>
</div>

<!-- Save Toast -->
<div class="save-toast" id="save-toast">✅ 저장 완료</div>

<script>
// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
const SECTIONS = [
  {
    id: 'mand', title: '맨드', icon: '🗣️',
    desc: '아동이 동기(MOs)에 의한 맨드를 자발적으로 하는가?',
    items: [
      { num: 6, text: '촉진없이 20가지의 빠진 아이템을 맨드한다.', example: '예: 크레용을 주면 종이를 맨드' },
      { num: 7, text: '원하는 활동을 즐기기 위해 요구된 5가지 행동을 다른 사람에게 맨드한다.', example: '예: 밖에 나가기 위해 "열어", 그네에서 "밀어"' },
      { num: 8, text: '2개 이상의 단어를 포함하는 5가지 맨드를 한다. (I want 불포함)', example: '예: 빨리 가, 내 차례, 주스 따라' },
      { num: 9, text: '30분동안 15가지 다른 맨드를 자발적으로 한다.', example: '예: 놀자. 열어. 책 줘' },
      { num: 10, text: '특정한 맨드 훈련없이 10가지 새로운 맨드를 한다.', example: '예: 자발적으로 "고양이 어디갔어?"를 맨드 훈련없이 말한다.' }
    ]
  },
  {
    id: 'tact', title: '택트', icon: '👆',
    desc: '아동이 명사와 동사를 택트하는가?',
    items: [
      { num: 6, text: '"이게 뭐야"라고 물었을 때, 25가지 아이템을 택트한다.', example: '예: 책, 신발, 자동차, 강아지, 모자' },
      { num: 7, text: '50개 아이템중 3개의 예를 택트 일반화 한다.', example: '예: 3가지 다른 자동차를 택트한다.' },
      { num: 8, text: '"나 뭐하고 있어"라고 물으면 10가지 행동을 택트한다.', example: '예: 점핑, 잠자기, 먹기' },
      { num: 9, text: '50가지 두가지 요소 명사-동사 조합을 택트한다.', example: '예: 얼굴 닦고있어, 아기 자고있어' },
      { num: 10, text: '200개 명사 그리고/또는 동사(또는 다른 언어 부분)를 택트한다.', example: '알고있는 택트 리스트 기준' }
    ]
  },
  {
    id: 'listener', title: '청자 반응', icon: '👂',
    desc: '아동이 더 진보된 청자 기술을 습득하고 있는가?',
    items: [
      { num: 6, text: '뒤섞인 6개중에서 정확한 아이템을 선택한다. 40가지 물건 또는 사진', example: '예: 고양이 찾아봐, 볼 만져봐' },
      { num: 7, text: '뒤섞인 8개중에서 3가지 예를 선택하는 등 청자변별(LDs)을 일반화한다. 50가지 물건', example: '예: 아동은 열차의 3가지 예를 찾는다.' },

  },
  {
    id: 'visual', title: '시지각 기술과 매칭', icon: '👁️',

  },
  {
    id: 'play', title: '독립 놀이', icon: '🧸',

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentProfile = null;
let selectedProfileId = null;

function getProfiles() {
  return JSON.parse(localStorage.getItem('vbmapp_profiles') || '[]');
}
function saveProfiles(profiles) {
  localStorage.setItem('vbmapp_profiles', JSON.stringify(profiles));
}
function getChecks(profileId) {
  return JSON.parse(localStorage.getItem('vbmapp_checks_' + profileId) || '{}');
}
function saveChecks(profileId, checks) {
  localStorage.setItem('vbmapp_checks_' + profileId, JSON.stringify(checks));
}

// ═══════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='select'&&i===0)||(tab==='new'&&i===1)));
  document.getElementById('tab-select').style.display = tab==='select' ? '' : 'none';
  document.getElementById('tab-new').style.display = tab==='new' ? '' : 'none';
}

function renderProfileList() {
  const profiles = getProfiles();
  const list = document.getElementById('profile-list');
  const empty = document.getElementById('profile-list-empty');
  const pinSection = document.getElementById('pin-enter-section');
  list.innerHTML = '';
  selectedProfileId = null;
  pinSection.style.display = 'none';
  if (profiles.length === 0) { empty.style.display = ''; return; }
  empty.style.display = 'none';
  profiles.forEach(p => {
    const checks = getChecks(p.id);
    const done = Object.values(checks).filter(Boolean).length;
    const pct = Math.round(done/60*100);
    const div = document.createElement('div');
    div.className = 'profile-item';
    div.dataset.id = p.id;
    div.innerHTML = `
      <div class="profile-avatar">${p.name[0]}</div>
      <div>
        <div class="profile-name">${p.name}</div>
        <div class="profile-progress">${done}/60 완료 (${pct}%)</div>
      </div>`;
    div.onclick = () => selectProfile(p.id);
    list.appendChild(div);
  });
}

function selectProfile(id) {
  selectedProfileId = id;
  document.querySelectorAll('.profile-item').forEach(el => el.classList.toggle('selected', el.dataset.id === id));
  document.getElementById('pin-enter-section').style.display = '';
  document.getElementById('pin-error').style.display = 'none';
  ['p0','p1','p2','p3'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p0').focus();
}

function pinMove(idx) {
  const el = document.getElementById('p'+idx);
  const val = el.value.toString().slice(-1);
  el.value = val;
  if (val && idx < 3) document.getElementById('p'+(idx+1)).focus();
}

function loginWithPin() {
  if (!selectedProfileId) return;
  const pin = ['p0','p1','p2','p3'].map(id => document.getElementById(id).value).join('');
  const profiles = getProfiles();
  const profile = profiles.find(p => p.id === selectedProfileId);
  if (!profile || profile.pin !== pin) {
    document.getElementById('pin-error').style.display = '';
    return;
  }
  document.getElementById('pin-error').style.display = 'none';
  enterApp(profile);
}

function newPinMove(idx) {
  const el = document.getElementById('n'+idx);
  const val = el.value.toString().slice(-1);
  el.value = val;
  if (val && idx < 3) document.getElementById('n'+(idx+1)).focus();
}

function createProfile() {
  const name = document.getElementById('new-name').value.trim();
  const pin = ['n0','n1','n2','n3'].map(id => document.getElementById(id).value).join('');
  const errEl = document.getElementById('new-error');
  if (!name || pin.length < 4) { errEl.style.display = ''; return; }
  errEl.style.display = 'none';
  const profiles = getProfiles();
  const profile = { id: Date.now().toString(), name, pin };
  profiles.push(profile);
  saveProfiles(profiles);
  enterApp(profile);
}

function enterApp(profile) {
  currentProfile = profile;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('manage-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('hdr-name').textContent = profile.name;
  document.getElementById('hdr-avatar').textContent = profile.name[0];
  renderApp();
}

function logout() {
  currentProfile = null;
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  renderProfileList();
}

// ═══════════════════════════════════════════
//  MANAGE
// ═══════════════════════════════════════════
function showManage() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('manage-screen').style.display = 'block';
  renderManage();
}
function showLogin() {
  document.getElementById('manage-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  renderProfileList();
}
function renderManage() {
  const profiles = getProfiles();
  const list = document.getElementById('manage-list');
  list.innerHTML = '';
  if (profiles.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--muted);padding:20px;">등록된 프로필이 없습니다.</p>';
    return;
  }
  profiles.forEach(p => {
    const checks = getChecks(p.id);
    const done = Object.values(checks).filter(Boolean).length;
    const div = document.createElement('div');
    div.className = 'profile-manage-item';
    div.innerHTML = `
      <div class="profile-avatar">${p.name[0]}</div>
      <div>
        <div style="font-size:15px;font-weight:700;">${p.name}</div>
        <div style="font-size:12px;color:var(--muted);">${done}/60 완료</div>
      </div>
      <button class="delete-btn" onclick="deleteProfile('${p.id}')">삭제</button>`;
    list.appendChild(div);
  });
}
function deleteProfile(id) {
  if (!confirm('이 프로필과 모든 기록을 삭제할까요?')) return;
  const profiles = getProfiles().filter(p => p.id !== id);
  saveProfiles(profiles);
  localStorage.removeItem('vbmapp_checks_' + id);
  renderManage();
}

// ═══════════════════════════════════════════
//  APP
// ═══════════════════════════════════════════
function renderApp() {
  const checks = getChecks(currentProfile.id);
  const list = document.getElementById('section-list');
  list.innerHTML = '';
  SECTIONS.forEach(sec => {
    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = 'sec-' + sec.id;
    const done = sec.items.filter(item => checks[sec.id + '_' + item.num]).length;
    const isDone = done === sec.items.length;
    card.innerHTML = `
      <div class="section-header" onclick="toggleSection('${sec.id}')">
        <div class="section-icon">${sec.icon}</div>
        <div class="section-info">
          <div class="section-title">${sec.title}</div>
          <div class="section-meta">${sec.desc}</div>
        </div>
        <div class="section-badge ${isDone?'done':''}">${done}/${sec.items.length}</div>
        <div class="chevron">⌄</div>
      </div>
      <div class="section-progress-bar">
        <div class="section-progress-fill ${isDone?'done':''}" style="width:${(done/sec.items.length*100)}%"></div>
      </div>
      <div class="items-container" id="items-${sec.id}">
        ${sec.items.map(item => {
          const key = sec.id + '_' + item.num;
          const checked = !!checks[key];
          return `
          <div class="item-row" onclick="toggleItem('${sec.id}','${item.num}')">
            <div class="item-num ${checked?'checked':''}" id="num-${sec.id}-${item.num}">${item.num}</div>
            <div class="item-content">
              <div class="item-text">${item.text}</div>
              ${item.example ? `<div class="item-example">${item.example}</div>` : ''}
            </div>
            <div class="custom-check ${checked?'checked':''}" id="chk-${sec.id}-${item.num}"></div>
          </div>`;
        }).join('')}
      </div>`;
    list.appendChild(card);
  });
  updateOverall();
}

function toggleSection(id) {
  const card = document.getElementById('sec-' + id);
  card.classList.toggle('open');
}

function toggleItem(secId, num) {
  const checks = getChecks(currentProfile.id);
  const key = secId + '_' + num;
  checks[key] = !checks[key];
  saveChecks(currentProfile.id, checks);

  const chk = document.getElementById('chk-' + secId + '-' + num);
  const numEl = document.getElementById('num-' + secId + '-' + num);
  chk.classList.toggle('checked', checks[key]);
  numEl.classList.toggle('checked', checks[key]);

  updateSection(secId);
  updateOverall();
  showToast();
}

function updateSection(secId) {
  const checks = getChecks(currentProfile.id);
  const sec = SECTIONS.find(s => s.id === secId);
  const done = sec.items.filter(item => checks[secId + '_' + item.num]).length;
  const isDone = done === sec.items.length;
  const card = document.getElementById('sec-' + secId);
  card.querySelector('.section-badge').textContent = done + '/' + sec.items.length;
  card.querySelector('.section-badge').className = 'section-badge' + (isDone ? ' done' : '');
  const fill = card.querySelector('.section-progress-fill');
  fill.style.width = (done/sec.items.length*100) + '%';
  fill.className = 'section-progress-fill' + (isDone ? ' done' : '');
}

function updateOverall() {
  const checks = getChecks(currentProfile.id);
  const done = Object.values(checks).filter(Boolean).length;
  const pct = Math.round(done/60*100);
  document.getElementById('overall-done').textContent = done;
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-pct').textContent = pct + '%';
}

let toastTimer;
function showToast() {
  const t = document.getElementById('save-toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderProfileList();
